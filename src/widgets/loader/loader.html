<div class="loader">
  <video class="loader-video" autoplay muted playsinline>
    <source src="/video/loader.mp4" type="video/mp4">
  </video>
</div>

<style>
  .loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loader-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .loader.closing {
    animation: loader-exit 0.4s ease-in-out;
  }

  @keyframes loader-exit {
    to {
      opacity: 0;
    }
  }
</style>


<script>
  const loader = document.querySelector('.loader');

  if (sessionStorage.getItem('loaderClosed')) {
    loader.remove();
  } else {
    const video = loader.querySelector('.loader-video');

    const videoEnded = new Promise(resolve => {
      video.addEventListener('ended', resolve, { once: true });
    });

    const pageLoaded = new Promise(resolve => {
      if (document.readyState === 'complete') {
        resolve();
      } else {
        window.addEventListener('load', resolve, { once: true });
      }
    });

    Promise.all([videoEnded, pageLoaded]).then(() => {
      loader.addEventListener('animationend', () => {
        loader.remove();
        sessionStorage.setItem('loaderClosed', 'true');
        window.dispatchEvent(new Event('loader:closed'));
      }, { once: true });
      loader.classList.add('closing');
    });

    // якщо контент не готовий — повторюємо відео
    video.addEventListener('ended', () => {
      pageLoaded.then(() => { }); // вже вирішено
      if (document.readyState !== 'complete') {
        video.play(); // повторити відео
      }
    });
  }
</script>
